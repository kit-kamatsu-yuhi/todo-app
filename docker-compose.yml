services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # SQLite を named volume (/app/data) 配下に置いて永続化する。
      DATABASE_URL: "file:/app/data/dev.db"
      NODE_ENV: production
    volumes:
      # named volume をマウントしてコンテナ再起動後も DB ファイルを保持する。
      - db-data:/app/data
    # #7 ではモデルが無いため、SQLite ファイルは Prisma Client の初回接続時に
    # 自動作成される（マイグレーション不要）。$queryRaw SELECT 1 で接続確認できる。
    # 業務モデルを追加する #8 以降で prisma migrate deploy を起動前に実行する。
    restart: unless-stopped

volumes:
  db-data:
