services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # SQLite を named volume (/app/data) 配下に置いて永続化する。
      DATABASE_URL: "file:/app/data/dev.db"
      NODE_ENV: production
    volumes:
      # named volume をマウントしてコンテナ再起動後も DB ファイルを保持する。
      - db-data:/app/data
    # #8: 業務モデル追加に伴い、起動前に prisma migrate deploy を実行してスキーマを適用する。
    command: sh -c "node node_modules/prisma/build/index.js migrate deploy && node server.js"
    restart: unless-stopped

volumes:
  db-data:
